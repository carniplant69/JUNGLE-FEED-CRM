<body>
<div id="root"></div>
<script type="text/javascript">
var useState=React.useState;var useEffect=React.useEffect;var useMemo=React.useMemo;var useRef=React.useRef;

var SB_URL = "https://oemulphojkquayjvxcvb.supabase.co";
var SB_KEY = "sb_publishable_4S5c35xXkjgDjNb6JK93JA_00jYqzo5";

var api = async function(path, method, body) {
  method = method || "GET";
  var r = await fetch(SB_URL + "/rest/v1/" + path, {
    method: method,
    headers: {
      "apikey": SB_KEY,
      "Authorization": "Bearer " + SB_KEY,
      "Content-Type": "application/json",
      "Prefer": method === "POST" ? "return=representation" : method === "PATCH" ? "return=representation" : ""
    },
    body: body ? JSON.stringify(body) : null
  });
  if (!r.ok) { var e = await r.text(); throw new Error(e); }
  var t = await r.text();
  return t ? JSON.parse(t) : null;
};

var uploadFacture = async function(file, cmdId) {
  var ext = file.name.split(".").pop();
  var path = cmdId + "." + ext;
  var r2 = await fetch(SB_URL + "/storage/v1/object/factures/" + path, {
    method: "POST",
    headers: { "apikey": SB_KEY, "Authorization": "Bearer " + SB_KEY, "Content-Type": file.type },
    body: file
  });
  if (!r2.ok) { var e2 = await r2.text(); throw new Error(e2); }
  return SB_URL + "/storage/v1/object/public/factures/" + path;
};

var SEGS_KEY = "jf_segments";
var loadSegs = function() {
  try { return JSON.parse(localStorage.getItem(SEGS_KEY)) || ["Fleuriste","Jardinerie","Pepiniere","Distributeur","Revendeur","Grande surface","Particulier","Autre"]; }
  catch(e) { return ["Fleuriste","Jardinerie","Pepiniere","Distributeur","Revendeur","Grande surface","Particulier","Autre"]; }
};
var saveSegs = function(v) { localStorage.setItem(SEGS_KEY, JSON.stringify(v)); };

var eur = function(n) { return new Intl.NumberFormat("fr-FR", {style:"currency",currency:"EUR"}).format(n||0); };
var dfmt = function(d) { return d ? new Date(d).toLocaleDateString("fr-FR") : "-"; };
var nowDate = function() { return new Date().toISOString().slice(0,10); };
var prixTTC = function(p) { return p ? p.prix_ht * (1 + p.tva / 100) : 0; };

var SC = {
  "Livre":"#16a34a", "En cours":"#b45309", "En attente":"#c2410c",
  "Annule":"#dc2626", "A faire":"#c2410c", "Fait":"#16a34a", "Planifie":"#1d4ed8"
};
var SEG_COLORS = ["#7c3aed","#0369a1","#0f766e","#b45309","#be185d","#4338ca","#059669","#dc2626","#0891b2","#65a30d"];
var TC_COL = {"Client":"#16a34a","Prospect":"#f59e0b"};
var TC_BG  = {"Client":"#f0fdf4","Prospect":"#fffbeb"};

function Badge(props) {
  var v = props.v; var c = props.c || "#6b7280";
  return React.createElement("span", {
    style: {background:c+"18",color:c,border:"1px solid "+c+"35",borderRadius:5,
      padding:"2px 8px",fontSize:11,fontWeight:600,letterSpacing:.2,whiteSpace:"nowrap"}
  }, v);
}

function Btn(props) {
  var v = props.v || "p"; var onClick = props.onClick; var style = props.style || {};
  var bg = v==="p" ? "#16a34a" : v==="g" ? "transparent" : v==="red" ? "#dc2626" : "#fff";
  var col = v==="p" ? "#fff" : v==="g" ? "#6b7280" : v==="red" ? "#fff" : "#374151";
  var border = v==="s" ? "1px solid #d1d5db" : "none";
  return React.createElement("button", {
    onClick: onClick,
    style: Object.assign({display:"inline-flex",alignItems:"center",gap:5,padding:"8px 14px",
      borderRadius:7,fontWeight:600,fontSize:13,background:bg,color:col,border:border}, style)
  }, props.children);
}

function Inp(props) {
  return React.createElement("input", {
    type: props.type || "text", value: props.value, onChange: props.onChange,
    placeholder: props.placeholder || "", onKeyDown: props.onKeyDown,
    style: Object.assign({background:"#fff",border:"1px solid #d1d5db",borderRadius:7,
      padding:"9px 12px",color:"#111827",fontSize:13,width:"100%",outline:"none"}, props.style||{})
  });
}

function Sel(props) {
  return React.createElement("select", {
    value: props.value, onChange: props.onChange,
    style: Object.assign({background:"#fff",border:"1px solid #d1d5db",borderRadius:7,
      padding:"9px 12px",color:"#111827",fontSize:13,width:"100%",outline:"none"}, props.style||{})
  }, props.children);
}

function Fld(props) {
  return React.createElement("div", {style:{marginBottom:13}},
    React.createElement("label", {style:{fontSize:11,color:"#6b7280",fontWeight:600,
      textTransform:"uppercase",letterSpacing:.7,marginBottom:5,display:"block"}}, props.label),
    props.children
  );
}

function Card(props) {
  return React.createElement("div", {
    style: Object.assign({background:"#fff",border:"1px solid #e5e7eb",borderRadius:12,
      padding:"18px 22px",marginBottom:14,boxShadow:"0 1px 3px rgba(0,0,0,.05)"}, props.style||{})
  }, props.children);
}

function SecT(props) {
  return React.createElement("div", {
    style: Object.assign({fontSize:11,fontWeight:700,color:"#9ca3af",textTransform:"uppercase",
      letterSpacing:1.5,marginBottom:12}, props.style||{})
  }, props.children);
}

function TH(props) {
  return React.createElement("th", {
    style:{textAlign:"left",padding:"9px 13px",fontSize:11,color:"#6b7280",fontWeight:600,
      textTransform:"uppercase",letterSpacing:.7,borderBottom:"2px solid #f3f4f6",
      background:"#fafafa",whiteSpace:"nowrap"}
  }, props.children);
}

function TD(props) {
  return React.createElement("td", {
    style: Object.assign({padding:"10px 13px",fontSize:13,borderBottom:"1px solid #f9fafb",
      verticalAlign:"middle",color:"#374151"}, props.style||{})
  }, props.children);
}

function Ovl(props) {
  var wide = props.wide;
  return React.createElement("div", {
    style:{position:"fixed",inset:0,background:"rgba(0,0,0,.35)",zIndex:999,
      display:"flex",alignItems:"center",justifyContent:"center",padding:16},
    onClick: props.onClose
  },
    React.createElement("div", {
      style:{background:"#fff",borderRadius:14,padding:"24px 28px",
        width:wide?620:490,maxHeight:"92vh",overflowY:"auto",
        boxShadow:"0 24px 60px rgba(0,0,0,.18)"},
      onClick: function(e) { e.stopPropagation(); }
    }, props.children)
  );
}

function MH(props) {
  return React.createElement("div", {
    style:{display:"flex",justifyContent:"space-between",alignItems:"center",
      marginBottom:20,paddingBottom:14,borderBottom:"1px solid #f3f4f6"}
  },
    React.createElement("span", {style:{fontSize:16,fontWeight:700,color:"#111827"}}, props.title),
    React.createElement("button", {
      onClick: props.onClose,
      style:{background:"none",border:"none",fontSize:22,color:"#9ca3af",cursor:"pointer",lineHeight:1}
    }, "x")
  );
}

function Divider() {
  return React.createElement("div", {style:{borderTop:"1px solid #f3f4f6",margin:"16px 0"}});
}

// ── APP ───────────────────────────────────────────────────────────────────────
function App() {
  var s = useState("dash"); var pg = s[0]; var setPg = s[1];
  var s2 = useState([]); var clients = s2[0]; var setC = s2[1];
  var s3 = useState([]); var cmds = s3[0]; var setCmds = s3[1];
  var s4 = useState([]); var rels = s4[0]; var setRels = s4[1];
  var s5 = useState([]); var prods = s5[0]; var setProds = s5[1];
  var s6 = useState(true); var loading = s6[0]; var setLd = s6[1];
  var s7 = useState(false); var dbOk = s7[0]; var setDbOk = s7[1];
  var s8 = useState(""); var q = s8[0]; var setQ = s8[1];
  var s9 = useState(null); var modal = s9[0]; var setModal = s9[1];
  var s10 = useState(null); var toast = s10[0]; var setToast = s10[1];
  var s11 = useState(null); var prog = s11[0]; var setProg = s11[1];
  var s12 = useState(loadSegs()); var segs = s12[0]; var setSegs = s12[1];
  var s13 = useState({y:new Date().getFullYear(),m:new Date().getMonth()}); var calMois = s13[0]; var setCalMois = s13[1];
  var s14 = useState([]); var echanges = s14[0]; var setEchanges = s14[1];
  var fRef = useRef();

  var ok = function(msg) { setToast({msg:msg,t:"ok"}); setTimeout(function(){setToast(null);},3000); };
  var err = function(msg) { setToast({msg:msg,t:"err"}); setTimeout(function(){setToast(null);},3500); };
  var cls = function() { setModal(null); };

  var load = async function() {
    setLd(true);
    try {
      var results = await Promise.all([
        api("clients?order=nom.asc&limit=2000"),
        api("commandes?order=date.desc&limit=2000"),
        api("relances?order=date.asc&limit=2000"),
        api("produits?order=nom.asc&limit=500").catch(function(){return [];}),
        api("echanges?order=date.desc&limit=2000").catch(function(){return [];})
      ]);
      setC(results[0]||[]); setCmds(results[1]||[]); setRels(results[2]||[]); setProds(results[3]||[]); setEchanges(results[4]||[]);
      setDbOk(true);
    } catch(e) { setDbOk(false); }
    setLd(false);
  };

  useEffect(function() { load(); }, []);

  var today = nowDate();
  var caTotal = useMemo(function() {
    return cmds.filter(function(c){return c.statut!=="Annule";}).reduce(function(s,c){return s+(c.total||0);},0);
  }, [cmds]);
  var caMois = useMemo(function() {
    var m = new Date().getMonth(); var y = new Date().getFullYear();
    return cmds.filter(function(c){ var d=new Date(c.date); return d.getMonth()===m&&d.getFullYear()===y&&c.statut!=="Annule"; }).reduce(function(s,c){return s+(c.total||0);},0);
  }, [cmds]);
  var caJour = useMemo(function() {
    return cmds.filter(function(c){return c.date&&c.date.slice(0,10)===today&&c.statut!=="Annule";}).reduce(function(s,c){return s+(c.total||0);},0);
  }, [cmds]);
  var urgents = rels.filter(function(r){return r.statut==="A faire"&&new Date(r.date)<=new Date(Date.now()+7*864e5);});

  var getC = function(id) { return clients.find(function(c){return c.id===id;}); };
  var segColor = function(seg) { var i=segs.indexOf(seg); return SEG_COLORS[i%SEG_COLORS.length]||"#6b7280"; };

  var saveClient = async function(d) {
    try {
      var payload = {nom:d.nom,contact:d.contact,email:d.email,tel:d.tel,adresse:d.adresse||"",code_postal:d.code_postal||"",ville:d.ville,pays:d.pays||"France",segment:d.segment,notes:d.notes,type_contact:d.type_contact||"Client"};
      if (d.id) await api("clients?id=eq."+d.id, "PATCH", payload);
      else await api("clients", "POST", Object.assign({},payload,{ca_total:0}));
      await load(); ok("Client enregistre"); cls();
    } catch(e) { err(e.message); }
  };

  var deleteClient = async function(id) {
    if (!confirm("Supprimer ce client ?")) return;
    try {
      await api("relances?client_id=eq."+id, "DELETE");
      await api("commandes?client_id=eq."+id, "DELETE");
      await api("clients?id=eq."+id, "DELETE");
      await load(); ok("Client supprime"); cls();
    } catch(e) { err(e.message); }
  };

  var saveProd = async function(d) {
    try {
      if (d.id) await api("produits?id=eq."+d.id, "PATCH", {nom:d.nom,categorie:d.categorie,prix_ht:+d.prix_ht,tva:+d.tva});
      else await api("produits", "POST", {nom:d.nom,categorie:d.categorie,prix_ht:+d.prix_ht,tva:+d.tva});
      await load(); ok("Produit enregistre"); cls();
    } catch(e) { err(e.message); }
  };

  var deleteProd = async function(id) {
    if (!confirm("Supprimer ce produit ?")) return;
    try { await api("produits?id=eq."+id, "DELETE"); await load(); ok("Produit supprime"); }
    catch(e) { err(e.message); }
  };

  var saveCmd = async function(d, factureFile) {
    try {
      var total = (d.produits||[]).reduce(function(s,l){ var p=prods.find(function(x){return x.id===l.prod_id;}); return s+(p?prixTTC(p)*l.qte:0); }, 0);
      var facture_url = null;
      var rows = await api("commandes", "POST", {client_id:d.client_id,statut:d.statut,produits:d.produits,notes:d.notes,total:total,date:today,facture_url:null});
      var newId = rows && rows[0] && rows[0].id;
      if (factureFile && newId) {
        try { facture_url = await uploadFacture(factureFile, newId); await api("commandes?id=eq."+newId, "PATCH", {facture_url:facture_url}); }
        catch(e) { console.warn("Upload:", e.message); }
      }
      var cl = clients.find(function(c){return c.id===d.client_id;});
      if (cl) await api("clients?id=eq."+cl.id, "PATCH", {ca_total:(cl.ca_total||0)+total});
      await load(); ok("Commande enregistree"); cls();
    } catch(e) { err(e.message); }
  };

  var saveRel = async function(d) {
    try {
      if (d.id) {
        // Modification d'une relance existante
        await api("relances?id=eq."+d.id, "PATCH", {
          date: d.date,
          objet: d.objet,
          priorite: d.priorite||"Normale",
          recurrence: d.recurrence||"aucune"
        });
        await load(); ok("Relance modifiee"); cls();
      } else {
        // Nouvelle relance
        var base = {client_id:d.client_id,date:d.date,objet:d.objet,priorite:d.priorite||"Normale",statut:"A faire",recurrence:d.recurrence||"aucune"};
        await api("relances", "POST", base);
        // Creer les occurrences si recurrence activee
        if (d.recurrence && d.recurrence !== "aucune") {
          var mois = parseInt(d.recurrence);
          var cur = new Date(d.date);
          var fin = d.recurrence_fin ? new Date(d.recurrence_fin) : null;
          for (var i = 1; i <= 24; i++) {
            cur = new Date(cur.getFullYear(), cur.getMonth() + mois, cur.getDate());
            if (fin && cur > fin) break;
            var nd = cur.toISOString().slice(0,10);
            await api("relances", "POST", Object.assign({}, base, {date:nd, recurrence:"aucune"}));
          }
        }
        await load(); ok("Relance creee"); cls();
      }
    } catch(e) { err(e.message); }
  };

  var doneRel = async function(id) {
    try {
      await api("relances?id=eq."+id, "PATCH", {statut:"Fait"});
      setRels(function(p){return p.map(function(r){return r.id===id?Object.assign({},r,{statut:"Fait"}):r;});});
      ok("Relance effectuee");
    } catch(e) {}
  };

  var deleteRel = async function(id) {
    try { await api("relances?id=eq."+id, "DELETE"); await load(); ok("Relance supprimee"); }
    catch(e) { err(e.message); }
  };

  var saveEchange = async function(d) {
    try {
      await api("echanges", "POST", {client_id:d.client_id,date:d.date,type:d.type,objet:d.objet,contenu:d.contenu||"",suite:d.suite||""});
      await load(); ok("Echange enregistre");
    } catch(e) { err("Erreur - verifiez que la table echanges existe dans Supabase: "+e.message); }
  };

  var deleteEchange = async function(id) {
    try { await api("echanges?id=eq."+id, "DELETE"); setEchanges(function(p){return p.filter(function(e){return e.id!==id;});}); ok("Echange supprime"); }
    catch(e) { err(e.message); }
  };

  var importCSV = async function(file) {
    var text = await file.text();
    var lines = text.split("\n").filter(Boolean);
    var parseRow = function(row) {
      var p=[]; var inQ=false; var cur="";
      for (var ci=0; ci<row.length; ci++) {
        var ch=row[ci];
        if(ch==='"'){inQ=!inQ;continue;}
        if(ch===","&&!inQ){p.push(cur.trim());cur="";continue;}
        cur+=ch;
      }
      p.push(cur.trim()); return p;
    };
    var headers = parseRow(lines[0]).map(function(h){return h.replace(/"/g,"").trim();});
    var col = function(parts,n) { var i=headers.indexOf(n); return i>=0?(parts[i]||"").trim():""; };
    var rows = lines.slice(1).filter(function(l){return l.trim();});
    var done=0; var imp=0;
    setProg({done:0,total:rows.length,imp:0});
    for (var i=0; i<rows.length; i+=20) {
      var batch = rows.slice(i,i+20);
      var ins = [];
      for (var j=0; j<batch.length; j++) {
        var parts = parseRow(batch[j]);
        var type = col(parts,"Type");
        if(type!=="Entreprise"&&type!=="Personne"){done++;continue;}
        var nom = col(parts,"Nom")||col(parts,"Entreprise")||"";
        if(!nom||nom==="Capsule"||nom==="JUNGLE FEED"){done++;continue;}
        var email = col(parts,"E-mail")||col(parts,"Adresse electronique")||"";
        var tel = col(parts,"Numero de telephone")||col(parts,"Mobile Telephone")||"";
        var ville = col(parts,"Ville")||"";
        var contact = type==="Personne"?(col(parts,"Prenom")+" "+col(parts,"Nom de famille")).trim():"";
        var etiq = col(parts,"Etiquettes")||"";
        var seg = segs[0]||"Autre";
        ins.push({nom:nom,contact:contact||col(parts,"Fonction")||"",email:email,tel:tel,ville:ville,segment:seg,notes:etiq,ca_total:0});
        done++; imp++;
      }
      if(ins.length>0){try{await api("clients","POST",ins);}catch(e){}}
      setProg({done:done,total:rows.length,imp:imp});
      await new Promise(function(r){setTimeout(r,50);});
    }
    await load(); setProg(null); ok(imp+" contacts importes !"); cls();
  };

  var updateSegs = function(ns) { setSegs(ns); saveSegs(ns); };

  // ── Setup DB screen ──────────────────────────────────────────────────────────
  if (!dbOk && !loading) {
    return React.createElement("div", {style:{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",background:"#f5f6fa",padding:30}},
      React.createElement(Card, {style:{maxWidth:580,width:"100%"}},
        React.createElement("div", {style:{fontSize:22,fontWeight:800,color:"#16a34a",marginBottom:14}}, "Jungle Feed CRM - Configuration"),
        React.createElement("p", {style:{fontSize:13,color:"#6b7280",lineHeight:1.8,marginBottom:14}},
          "Tables introuvables. Allez dans Supabase > SQL Editor > New Query, collez ce SQL et cliquez Run :"
        ),
        React.createElement("pre", {style:{background:"#f9fafb",border:"1px solid #e5e7eb",borderRadius:8,padding:"12px 14px",fontSize:11,color:"#374151",overflowX:"auto",whiteSpace:"pre-wrap",marginBottom:16,lineHeight:1.7}},
          "create table if not exists clients (\n  id uuid primary key default gen_random_uuid(),\n  nom text not null, contact text, email text, tel text,\n  ville text, segment text default 'Fleuriste', notes text,\n  ca_total numeric default 0, created_at timestamptz default now()\n);\ncreate table if not exists produits (\n  id uuid primary key default gen_random_uuid(),\n  nom text not null, categorie text default 'Autre',\n  prix_ht numeric default 0, tva numeric default 20,\n  created_at timestamptz default now()\n);\ncreate table if not exists commandes (\n  id uuid primary key default gen_random_uuid(),\n  client_id uuid references clients(id),\n  date date default current_date, statut text default 'En attente',\n  produits jsonb default '[]', total numeric default 0,\n  notes text, facture_url text, created_at timestamptz default now()\n);\ncreate table if not exists relances (\n  id uuid primary key default gen_random_uuid(),\n  client_id uuid references clients(id),\n  date date, objet text, statut text default 'A faire',\n  priorite text default 'Normale', created_at timestamptz default now()\n);"
        ),
        React.createElement(Btn, {onClick:load}, "J'ai execute le SQL - Relancer")
      )
    );
  }

  if (loading) {
    return React.createElement("div", {style:{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",background:"#f5f6fa",flexDirection:"column",gap:10}},
      React.createElement("div", {style:{fontSize:22,fontWeight:800,color:"#16a34a"}}, "Jungle Feed CRM"),
      React.createElement("div", {style:{fontSize:13,color:"#6b7280"}}, "Connexion en cours...")
    );
  }

  // ── Pages ────────────────────────────────────────────────────────────────────
  function Dash() {
    var maxQ = 1;
    var topP = useMemo(function() {
      var a={};
      cmds.filter(function(c){return c.statut!=="Annule";}).forEach(function(cmd){
        (cmd.produits||[]).forEach(function(l){ a[l.prod_id]=(a[l.prod_id]||0)+l.qte; });
      });
      var arr = Object.keys(a).map(function(id){return {p:prods.find(function(x){return x.id===id;}),qte:a[id]};}).filter(function(x){return x.p;});
      arr.sort(function(a,b){return b.qte-a.qte;});
      return arr;
    }, [cmds, prods]);
    if (topP.length > 0) maxQ = topP[0].qte;

    return React.createElement(React.Fragment, null,
      React.createElement("div", {style:{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:18}},
        [{l:"CA Aujourd'hui",v:eur(caJour),c:"#16a34a",s:new Date().toLocaleDateString("fr-FR")},
         {l:"CA du mois",v:eur(caMois),c:"#1d4ed8",s:"Mois en cours"},
         {l:"CA Total",v:eur(caTotal),c:"#7c3aed",s:"Toutes periodes"},
