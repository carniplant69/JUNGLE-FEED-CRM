<body>

<script type="text/babel">
const {useState,useEffect,useMemo,useRef} = React;

const SB_URL = "https://oemulphojkquayjvxcvb.supabase.co";
const SB_KEY = "sb_publishable_4S5c35xXkjgDjNb6JK93JA_00jYqzo5";

const api = async (path, method="GET", body=null) => {
  const r = await fetch(`${SB_URL}/rest/v1/${path}`, {
    method,
    headers:{
      "apikey":SB_KEY,"Authorization":`Bearer ${SB_KEY}`,
      "Content-Type":"application/json",
      "Prefer":method==="POST"?"return=representation":method==="PATCH"?"return=representation":""
    },
    body:body?JSON.stringify(body):null
  });
  if(!r.ok){const e=await r.text();throw new Error(e);}
  const t=await r.text(); return t?JSON.parse(t):null;
};

const uploadFacture = async (file, cmdId) => {
  const ext=file.name.split('.').pop();
  const path=`${cmdId}.${ext}`;
  const r=await fetch(`${SB_URL}/storage/v1/object/factures/${path}`,{
    method:"POST",
    headers:{"apikey":SB_KEY,"Authorization":`Bearer ${SB_KEY}`,"Content-Type":file.type},
    body:file
  });
  if(!r.ok){const e=await r.text();throw new Error(e);}
  return `${SB_URL}/storage/v1/object/public/factures/${path}`;
};

const SEGS_KEY="jf_segments";
const loadSegs=()=>{try{return JSON.parse(localStorage.getItem(SEGS_KEY))||["Fleuriste","Jardinerie","Pépinière","Distributeur","Revendeur","Grande surface","Particulier","Autre"];}catch(e){return["Fleuriste","Jardinerie","Pépinière","Distributeur","Revendeur","Grande surface","Particulier","Autre"];}};
const saveSegs=v=>localStorage.setItem(SEGS_KEY,JSON.stringify(v));

const eur  = n => new Intl.NumberFormat("fr-FR",{style:"currency",currency:"EUR"}).format(n||0);
const dfmt = d => d?new Date(d).toLocaleDateString("fr-FR"):"—";
const now  = () => new Date().toISOString().slice(0,10);
const prixTTC = p => p ? p.prix_ht*(1+p.tva/100) : 0;

const SC={
  "Livré":"#16a34a","En cours":"#b45309","En attente":"#c2410c",
  "Annulé":"#dc2626","À faire":"#c2410c","Fait":"#16a34a","Planifié":"#1d4ed8"
};
const SEG_COLORS=["#7c3aed","#0369a1","#0f766e","#b45309","#be185d","#4338ca","#059669","#dc2626","#0891b2","#65a30d"];
const TC_COL={"Client":"#16a34a","Prospect":"#f59e0b"};
const TC_BG={"Client":"#f0fdf4","Prospect":"#fffbeb"};
const RECURRENCES=["aucune","3 mois","6 mois","9 mois","12 mois"];

// ── Micro-composants ──────────────────────────────────────────────────────────

);

    background:v==="p"?"#16a34a":v==="g"?"transparent":v==="red"?"#dc2626":"#fff",
    color:v==="p"?"#fff":v==="g"?"#6b7280":v==="red"?"#fff":"#374151",

  }}>{children}</button>

const Card=({children,style={}})=>(

    {children}
  </div>
);

const SecT=({children,style={}})=>(
  <div style={{fontSize:11,fontWeight:700,color:"#9ca3af",textTransform:"uppercase",

const Divider=()=><div style={{borderTop:"1px solid #f3f4f6",margin:"16px 0"}}/>;

// ── APP ───────────────────────────────────────────────────────────────────────
function App(){
  const [pg,setPg]       = useState("dash");
  const [clients,setC]   = useState([]);
  const [cmds,setCmds]   = useState([]);
  const [rels,setRels]   = useState([]);
  const [prods,setProds]       = useState([]);
  const [echanges,setEchanges] = useState([]);
  const [loading,setLd]  = useState(true);
  const [dbOk,setDbOk]   = useState(false);
  const [q,setQ]         = useState("");
  const [modal,setModal] = useState(null);
  const [toast,setToast] = useState(null);
  const [prog,setProg]   = useState(null);
  const [segs,setSegs]   = useState(loadSegs());
  const fRef=useRef();

  const ok  = msg=>{setToast({msg,t:"ok"});  setTimeout(()=>setToast(null),3000);};
  const err = msg=>{setToast({msg,t:"err"}); setTimeout(()=>setToast(null),3500);};
  const cls = ()=>setModal(null);

  const load = async () => {
    setLd(true);
    try{
      const [c,cmd,r,p,e]=await Promise.all([
        api("clients?order=nom.asc&limit=2000"),
        api("commandes?order=date.desc&limit=2000"),
        api("relances?order=date.asc&limit=2000"),
        api("produits?order=nom.asc&limit=500").catch(()=>[]),
        api("echanges?order=date.desc&limit=5000").catch(()=>[]),
      ]);
      setC(c||[]); setCmds(cmd||[]); setRels(r||[]); setProds(p||[]); setEchanges(e||[]);
      setDbOk(true);
    }catch(e){setDbOk(false);}
    setLd(false);
  };

  useEffect(()=>{load();},[]);

  const today   = now();
  const caTotal = useMemo(()=>cmds.filter(c=>c.statut!=="Annulé").reduce((s,c)=>s+(c.total||0),0),[cmds]);
  const caMois  = useMemo(()=>{
    const m=new Date().getMonth(),y=new Date().getFullYear();
    return cmds.filter(c=>{const d=new Date(c.date);return d.getMonth()===m&&d.getFullYear()===y&&c.statut!=="Annulé";}).reduce((s,c)=>s+(c.total||0),0);
  },[cmds]);
  const caJour  = useMemo(()=>cmds.filter(c=>c.date?.slice(0,10)===today&&c.statut!=="Annulé").reduce((s,c)=>s+(c.total||0),0),[cmds]);
  const urgents = rels.filter(r=>r.statut==="À faire"&&new Date(r.date)<=new Date(Date.now()+7*864e5));

  const topP = useMemo(()=>{
    const a={};
    cmds.filter(c=>c.statut!=="Annulé").forEach(cmd=>(cmd.produits||[]).forEach(({prod_id,qte})=>{a[prod_id]=(a[prod_id]||0)+qte;}));
    return Object.entries(a).sort((a,b)=>b[1]-a[1]).map(([id,qte])=>({p:prods.find(x=>x.id===id),qte})).filter(x=>x.p);
  },[cmds,prods]);

  const getC  = id=>clients.find(c=>c.id===id);
  const segColor = seg=>SEG_COLORS[segs.indexOf(seg)%SEG_COLORS.length]||"#6b7280";

  // ── Import CSV ──────────────────────────────────────────────────────────────
  const importCSV = async file=>{
    const text=await file.text();
    const lines=text.split("\n").filter(Boolean);
    const pr=row=>{const p=[];let q=false,c="";for(const ch of row){if(ch==='"'){q=!q;continue;}if(ch===","&&!q){p.push(c.trim());c="";continue;}c+=ch;}p.push(c.trim());return p;};
    const headers=pr(lines[0]).map(h=>h.replace(/"/g,"").trim());
    const col=(parts,n)=>{const i=headers.indexOf(n);return i>=0?(parts[i]||"").trim():"";};
    const rows=lines.slice(1).filter(l=>l.trim());
    let done=0,imp=0;
    setProg({done:0,total:rows.length,imp:0});
    for(let i=0;i<rows.length;i+=20){
      const batch=rows.slice(i,i+20),ins=[];
      for(const row of batch){
        const parts=pr(row),type=col(parts,"Type");
        if(type!=="Entreprise"&&type!=="Personne"){done++;continue;}
        const nom=col(parts,"Nom")||col(parts,"Entreprise")||"";
        if(!nom||nom==="Capsule"||nom==="JUNGLE FEED"){done++;continue;}
        const email=col(parts,"E-mail")||col(parts,"Adresse électronique")||"";
        const tel=col(parts,"Numéro de téléphone")||col(parts,"Mobile Téléphone")||col(parts,"Work Téléphone")||"";
        const ville=col(parts,"Ville")||col(parts,"Ville de l'adresse professionnelle")||"";
        const contact=type==="Personne"?(col(parts,"Prénom")+" "+col(parts,"Nom de famille")).trim():"";
        const etiq=col(parts,"Étiquettes")||"";
        const seg=segs.find(s=>etiq.toLowerCase().includes(s.toLowerCase()))||segs[0]||"Autre";
        ins.push({nom,contact:contact||col(parts,"Fonction")||"",email,tel,ville,segment:seg,notes:etiq,ca_total:0});
        done++;imp++;
      }
      if(ins.length>0){try{await api("clients","POST",ins);}catch(e){}}
      setProg({done,total:rows.length,imp});
      await new Promise(r=>setTimeout(r,50));
    }
    await load();setProg(null);ok(`✅ ${imp} contacts importés !`);cls();
  };

  // ── CRUD clients ────────────────────────────────────────────────────────────
  const saveClient = async d=>{
    try{
      const fields={nom:d.nom,contact:d.contact,email:d.email,tel:d.tel,ville:d.ville,
        adresse:d.adresse||"",code_postal:d.code_postal||"",pays:d.pays||"France",
        type_contact:d.type_contact||"Client",
        segment:d.segment,notes:d.notes};
      if(d.id) await api(`clients?id=eq.${d.id}`,"PATCH",fields);
      else await api("clients","POST",{...fields,ca_total:0});
      await load();ok("Client enregistré ✓");cls();
    }catch(e){err(e.message);}
  };

  const deleteClient = async id=>{
    if(!confirm("Supprimer ce client ? Ses commandes et relances seront aussi supprimées.")) return;
    try{
      await api(`echanges?client_id=eq.${id}`,"DELETE");
      await api(`relances?client_id=eq.${id}`,"DELETE");
      await api(`commandes?client_id=eq.${id}`,"DELETE");
      await api(`clients?id=eq.${id}`,"DELETE");
      await load();ok("Client supprimé");cls();
    }catch(e){err(e.message);}
  };

  // ── CRUD échanges ────────────────────────────────────────────────────────────
  const saveEchange = async d=>{
    try{
      await api("echanges","POST",d);
      await load(); ok("Échange enregistré ✓");
    }catch(e){err("Erreur : vérifiez que la table 'echanges' existe dans Supabase.\n"+e.message);}
  };
  const deleteEchange = async id=>{
    try{
      await api(`echanges?id=eq.${id}`,"DELETE");
      setEchanges(prev=>prev.filter(e=>e.id!==id));
      ok("Échange supprimé");
    }catch(e){err(e.message);}
  };

  // ── CRUD produits ────────────────────────────────────────────────────────────
  const saveProd = async d=>{
    try{
      if(d.id) await api(`produits?id=eq.${d.id}`,"PATCH",{nom:d.nom,categorie:d.categorie,prix_ht:+d.prix_ht,tva:+d.tva});
      else await api("produits","POST",{nom:d.nom,categorie:d.categorie,prix_ht:+d.prix_ht,tva:+d.tva});
      await load();ok("Produit enregistré ✓");cls();
    }catch(e){err("Erreur : vérifiez que la table 'produits' existe dans Supabase.\n"+e.message);}
  };

  const deleteProd = async id=>{
    if(!confirm("Supprimer ce produit ?")) return;
    try{await api(`produits?id=eq.${id}`,"DELETE");await load();ok("Produit supprimé");}
    catch(e){err(e.message);}
  };

  // ── CRUD commandes ──────────────────────────────────────────────────────────
  const saveCmd = async (d,factureFile)=>{
    try{
      const total=(d.produits||[]).reduce((s,l)=>{const p=prods.find(x=>x.id===l.prod_id);return s+(p?prixTTC(p)*l.qte:0);},0);
      let facture_url=d.facture_url||null;
      const rows=await api("commandes","POST",{...d,total,date:today,facture_url});
      const newId=rows?.[0]?.id;
      if(factureFile&&newId){
        try{facture_url=await uploadFacture(factureFile,newId);await api(`commandes?id=eq.${newId}`,"PATCH",{facture_url});}
        catch(e){console.warn("Upload:",e.message);}
      }
      const cl=clients.find(c=>c.id===d.client_id);
      if(cl) await api(`clients?id=eq.${cl.id}`,"PATCH",{ca_total:(cl.ca_total||0)+total});
      await load();ok("Commande enregistrée ✓");cls();
    }catch(e){err(e.message);}
  };

  // ── CRUD relances ───────────────────────────────────────────────────────────
  const saveRel = async d=>{
    try{
      if(d.id){
        await api(`relances?id=eq.${d.id}`,"PATCH",{date:d.date,objet:d.objet,priorite:d.priorite,recurrence:d.recurrence||"aucune"});
        await load();ok("Relance modifiée ✓");cls();
      } else {
        const base={client_id:d.client_id,date:d.date,objet:d.objet,priorite:d.priorite||"Normale",statut:"À faire",recurrence:d.recurrence||"aucune"};
        await api("relances","POST",base);
        if(d.recurrence&&d.recurrence!=="aucune"){
          const mois=parseInt(d.recurrence);
          let cur=new Date(d.date);
          const fin=d.recurrence_fin?new Date(d.recurrence_fin):null;
          for(let i=1;i<=24;i++){
            cur=new Date(cur.getFullYear(),cur.getMonth()+mois,cur.getDate());
            if(fin&&cur>fin) break;
            const nd=cur.toISOString().slice(0,10);
            await api("relances","POST",{...base,date:nd,recurrence:"aucune"});
          }
        }
        await load();ok("Relance créée ✓");cls();
      }
    }catch(e){err(e.message);}
  };
  const deleteRel = async id=>{
    try{await api(`relances?id=eq.${id}`,"DELETE");await load();ok("Relance supprimée");}
    catch(e){err(e.message);}
  };
  const doneRel = async id=>{
    try{
      await api(`relances?id=eq.${id}`,"PATCH",{statut:"Fait"});
      setRels(p=>p.map(r=>r.id===id?{...r,statut:"Fait"}:r));
      ok("Relance effectuée ✓");
    }catch(e){}
  };

  const updateSegs = ns=>{setSegs(ns);saveSegs(ns);};

  // ── Setup DB ────────────────────────────────────────────────────────────────
  if(!dbOk&&!loading) return (
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",background:"#f5f6fa",padding:30}}>
      <Card style={{maxWidth:580,width:"100%"}}>
        <div style={{fontSize:22,fontWeight:800,color:"#16a34a",marginBottom:14}}>🌿 Jungle Feed CRM — Configuration</div>
        <p style={{fontSize:13,color:"#6b7280",lineHeight:1.8,marginBottom:14}}>
          Allez dans <strong style={{color:"#16a34a"}}>Supabase → SQL Editor → New Query</strong>, collez ce SQL et cliquez <strong style={{color:"#16a34a"}}>Run</strong> :
        </p>
        <pre style={{background:"#f9fafb",border:"1px solid #e5e7eb",borderRadius:8,padding:"12px 14px",fontSize:11,color:"#374151",overflowX:"auto",whiteSpace:"pre-wrap",marginBottom:16,lineHeight:1.7}}>{`create table if not exists clients (
  id uuid primary key default gen_random_uuid(),
  nom text not null, contact text, email text, tel text,
  ville text, segment text default 'Fleuriste', notes text,
  ca_total numeric default 0, created_at timestamptz default now()
);
create table if not exists produits (
  id uuid primary key default gen_random_uuid(),
  nom text not null, categorie text default 'Autre',
  prix_ht numeric default 0, tva numeric default 20,
  created_at timestamptz default now()
);
create table if not exists commandes (
  id uuid primary key default gen_random_uuid(),
  client_id uuid references clients(id),
  date date default current_date, statut text default 'En attente',
  produits jsonb default '[]', total numeric default 0,
  notes text, facture_url text, created_at timestamptz default now()
);
create table if not exists relances (
  id uuid primary key default gen_random_uuid(),
  client_id uuid references clients(id),
  date date, objet text, statut text default 'À faire',
  priorite text default 'Normale', created_at timestamptz default now()
);`}</pre>
        <Btn onClick={load}>▶ J'ai exécuté le SQL — Relancer</Btn>
      </Card>
    </div>
  );

  if(loading) return (
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",background:"#f5f6fa",flexDirection:"column",gap:10}}>
      <div style={{fontSize:22,fontWeight:800,color:"#16a34a"}}>🌿 Jungle Feed CRM</div>
      <div style={{fontSize:13,color:"#6b7280"}}>Connexion en cours...</div>
    </div>
  );

  // ── PAGES ──────────────────────────────────────────────────────────────────
  const Dash=()=>{
    const todayD = new Date();
    const yyyy = todayD.getFullYear();
    const mm   = String(todayD.getMonth()+1).padStart(2,"0");

    // Période sélectionnée
    const [mode,setMode]     = useState("mois");   // jour|semaine|mois|annee|libre
    const [selDate,setSelDate]= useState(now());
    const [selMois,setSelMois]= useState(`${yyyy}-${mm}`);
    const [selAnnee,setSelAnnee]=useState(String(yyyy));
    const [dateD,setDateD]   = useState(now());
    const [dateF,setDateF]   = useState(now());
    const [filtreProd,setFiltreProd]=useState("tous"); // id produit ou "tous"

    // Calcul plage de dates selon mode
    const plage = useMemo(()=>{
      if(mode==="jour") return {d:selDate, f:selDate};
      if(mode==="semaine"){
        const dt=new Date(selDate);
        const day=dt.getDay()||7;
        const lun=new Date(dt); lun.setDate(dt.getDate()-day+1);
        const dim=new Date(lun); dim.setDate(lun.getDate()+6);
        return {d:lun.toISOString().slice(0,10), f:dim.toISOString().slice(0,10)};
      }
      if(mode==="mois"){
        const [y,m]=selMois.split("-");
        const last=new Date(+y,+m,0).getDate();
        return {d:`${selMois}-01`, f:`${selMois}-${last}`};
      }
      if(mode==="annee") return {d:`${selAnnee}-01-01`, f:`${selAnnee}-12-31`};
      if(mode==="libre") return {d:dateD, f:dateF};
      return {d:now(), f:now()};
    },[mode,selDate,selMois,selAnnee,dateD,dateF]);

    const labelPeriode = useMemo(()=>{
      if(mode==="jour") return dfmt(plage.d);
      if(mode==="semaine") return `Semaine du ${dfmt(plage.d)} au ${dfmt(plage.f)}`;
      if(mode==="mois") return new Date(plage.d).toLocaleString("fr-FR",{month:"long",year:"numeric"});
      if(mode==="annee") return `Année ${selAnnee}`;
      return `${dfmt(plage.d)} → ${dfmt(plage.f)}`;
    },[mode,plage,selAnnee]);

    // Filtrage commandes sur la période
    const cmdsP = useMemo(()=>
      cmds.filter(c=>{
        const d=c.date?.slice(0,10)||"";
        if(d<plage.d||d>plage.f) return false;
        if(c.statut==="Annulé") return false;
        if(filtreProd!=="tous") return (c.produits||[]).some(l=>l.prod_id===filtreProd);
        return true;
      })
    ,[cmds,plage,filtreProd]);

    const caP       = cmdsP.reduce((s,c)=>s+(c.total||0),0);
    const nbCmdsP   = cmdsP.length;
    const panierMoy = nbCmdsP>0 ? caP/nbCmdsP : 0;
    const nbClientsP= new Set(cmdsP.map(c=>c.client_id)).size;

    // Top produits sur la période
    const topProdsP = useMemo(()=>{
      const a={};
      cmdsP.forEach(cmd=>(cmd.produits||[]).forEach(({prod_id,qte})=>{
        if(filtreProd!=="tous"&&prod_id!==filtreProd) return;
        a[prod_id]=(a[prod_id]||0)+qte;
      }));
      return Object.entries(a).sort((a,b)=>b[1]-a[1])
        .map(([id,qte])=>({p:prods.find(x=>x.id===id),qte})).filter(x=>x.p);
    },[cmdsP,filtreProd]);

    // CA par produit sur la période
    const caProdP = useMemo(()=>{
      const a={};
      cmdsP.forEach(cmd=>(cmd.produits||[]).forEach(({prod_id,qte})=>{
        const p=prods.find(x=>x.id===prod_id);
        if(p) a[prod_id]=(a[prod_id]||0)+prixTTC(p)*qte;
      }));
      return a;
    },[cmdsP]);

    // Top clients sur la période
    const topClientsP = useMemo(()=>{
      const a={};
      cmdsP.forEach(c=>{ a[c.client_id]=(a[c.client_id]||0)+(c.total||0); });
      return Object.entries(a).sort((a,b)=>b[1]-a[1])
        .map(([id,ca])=>({cl:getC(id),ca})).filter(x=>x.cl).slice(0,6);
    },[cmdsP]);

    const maxQP   = topProdsP[0]?.qte||1;
    const maxCaP  = topClientsP[0]?.ca||1;

    const MODES=[
      {id:"jour",lbl:"Jour"},
      {id:"semaine",lbl:"Semaine"},
      {id:"mois",lbl:"Mois"},
      {id:"annee",lbl:"Année"},
      {id:"libre",lbl:"Période libre"},
    ];

    const annees=[];
    for(let y=yyyy;y>=yyyy-5;y--) annees.push(String(y));

    return <>
      {/* Barre de filtres */}
      <Card style={{marginBottom:14}}>
        <div style={{display:"flex",flexWrap:"wrap",alignItems:"center",gap:10}}>
          {/* Boutons mode */}
          <div style={{display:"flex",gap:4,background:"#f3f4f6",borderRadius:8,padding:3}}>
            {MODES.map(m=>(
              <button key={m.id} onClick={()=>setMode(m.id)} style={{
                padding:"5px 12px",borderRadius:6,border:"none",fontSize:12,fontWeight:600,cursor:"pointer",
                background:mode===m.id?"#fff":"transparent",
                color:mode===m.id?"#111827":"#6b7280",
                boxShadow:mode===m.id?"0 1px 3px rgba(0,0,0,.1)":"none"
              }}>{m.lbl}</button>
            ))}
          </div>

          {/* Sélecteur selon mode */}
          {mode==="jour"&&<Inp type="date" value={selDate} onChange={e=>setSelDate(e.target.value)} style={{width:160}}/>}
          {mode==="semaine"&&<Inp type="date" value={selDate} onChange={e=>setSelDate(e.target.value)} style={{width:160}}/>}
          {mode==="mois"&&<Inp type="month" value={selMois} onChange={e=>setSelMois(e.target.value)} style={{width:160}}/>}
          {mode==="annee"&&<Sel value={selAnnee} onChange={e=>setSelAnnee(e.target.value)} style={{width:120}}>
            {annees.map(y=><option key={y}>{y}</option>)}
          </Sel>}
          {mode==="libre"&&<>
            <Inp type="date" value={dateD} onChange={e=>setDateD(e.target.value)} style={{width:150}}/>
            <span style={{color:"#6b7280",fontSize:13}}>→</span>
            <Inp type="date" value={dateF} onChange={e=>setDateF(e.target.value)} style={{width:150}}/>
          </>}

          {/* Filtre produit */}
          <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:7}}>
            <span style={{fontSize:12,color:"#6b7280",fontWeight:500,whiteSpace:"nowrap"}}>Produit :</span>
            <Sel value={filtreProd} onChange={e=>setFiltreProd(e.target.value)} style={{width:200}}>
              <option value="tous">Tous les produits</option>
              {prods.map(p=><option key={p.id} value={p.id}>{p.nom}</option>)}
            </Sel>
          </div>
        </div>
        <div style={{marginTop:8,fontSize:12,color:"#9ca3af",fontStyle:"italic"}}>
          📅 Période : <strong style={{color:"#374151"}}>{labelPeriode}</strong>
          {filtreProd!=="tous"&&<span>{" · "} 🌿 <strong style={{color:"#16a34a"}}>{prods.find(p=>p.id===filtreProd)?.nom}</strong></span>}
        </div>
      </Card>

      {/* KPIs période */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:14}}>
        {[
          {l:"CA sur la période",  v:eur(caP),       c:"#16a34a", s:labelPeriode},
          {l:"Commandes",          v:nbCmdsP,         c:"#1d4ed8", s:"sur la période"},
          {l:"Panier moyen",       v:eur(panierMoy),  c:"#7c3aed", s:"par commande"},
          {l:"Clients actifs",     v:nbClientsP,      c:"#b45309", s:"sur la période"},
        ].map(({l,v,c,s})=>(
          <div key={l} style={{background:"#fff",border:"1px solid #e5e7eb",borderRadius:12,
            padding:"16px 18px",borderLeft:"4px solid "+c,boxShadow:"0 1px 3px rgba(0,0,0,.05)"}}>
            <div style={{fontSize:11,color:"#6b7280",fontWeight:600,textTransform:"uppercase",letterSpacing:.8,marginBottom:6}}>{l}</div>
            <div style={{fontSize:24,fontWeight:800,color:c}}>{v}</div>
            <div style={{fontSize:11,color:"#9ca3af",marginTop:3}}>{s}</div>
          </div>
        ))}
      </div>

      {/* Compteurs globaux */}
      <div style={{display:"flex",gap:8,marginBottom:14}}>
        {[["👥",clients.length,"clients total"],["📦",cmds.length,"commandes total"],["📅",rels.filter(r=>r.statut!=="Fait").length,"relances actives"],["🌿",prods.length,"produits"]].map(([ico,n,l])=>(
          <div key={l} style={{background:"#fff",border:"1px solid #e5e7eb",borderRadius:8,padding:"7px 14px",fontSize:13,boxShadow:"0 1px 2px rgba(0,0,0,.04)"}}>
            {ico} <strong style={{color:"#111827"}}>{n}</strong> <span style={{color:"#6b7280"}}>{l}</span>
          </div>
        ))}
      </div>

      {/* Top produits + Top clients */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:14}}>
        <Card>
          <SecT>🌿 Top Produits — {labelPeriode}</SecT>
          {topProdsP.length===0
            ? <div style={{color:"#9ca3af",fontSize:13,padding:"8px 0"}}>Aucune vente sur cette période</div>
            : topProdsP.slice(0,6).map(({p,qte},i)=>(
              <div key={p.id} style={{marginBottom:12}}>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:4,alignItems:"center"}}>
                  <div style={{display:"flex",alignItems:"center",gap:7}}>
                    <span style={{fontSize:11,fontWeight:700,color:"#9ca3af",width:16}}>#{i+1}</span>
                    <span style={{color:"#374151",fontWeight:500}}>{p.nom}</span>
                  </div>
                  <div style={{display:"flex",gap:10,alignItems:"center"}}>
                    <span style={{color:"#6b7280",fontSize:12}}>{eur(caProdP[p.id]||0)}</span>
                    <span style={{color:"#16a34a",fontWeight:700,minWidth:40,textAlign:"right"}}>{qte} u.</span>
                  </div>
                </div>
                <div style={{height:6,borderRadius:3,background:"#f3f4f6"}}>
                  <div style={{height:"100%",width:Math.round(qte/maxQP*100)+"%",background:"#16a34a",borderRadius:3}}/>
                </div>
              </div>
            ))}
        </Card>

        <Card>
          <SecT>🏆 Top Clients — {labelPeriode}</SecT>
          {topClientsP.length===0
            ? <div style={{color:"#9ca3af",fontSize:13,padding:"8px 0"}}>Aucun client sur cette période</div>
            : topClientsP.map(({cl,ca},i)=>(
              <div key={cl.id} style={{marginBottom:12}}>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:4,alignItems:"center"}}>
                  <div style={{display:"flex",alignItems:"center",gap:7}}>
                    <span style={{fontSize:11,fontWeight:700,color:"#9ca3af",width:16}}>#{i+1}</span>
                    <div>
                      <div style={{color:"#374151",fontWeight:600}}>{cl.nom}</div>
                      {cl.segment&&<div style={{fontSize:11,color:"#9ca3af"}}>{cl.segment}</div>}
                    </div>
                  </div>
                  <span style={{color:"#1d4ed8",fontWeight:700}}>{eur(ca)}</span>
                </div>
                <div style={{height:6,borderRadius:3,background:"#f3f4f6"}}>
                  <div style={{height:"100%",width:Math.round(ca/maxCaP*100)+"%",background:"#1d4ed8",borderRadius:3}}/>
                </div>
              </div>
            ))}
        </Card>
      </div>

      {/* Relances urgentes + dernières commandes */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:14}}>
        <Card>
          <SecT>⏰ Relances urgentes</SecT>
          {urgents.length===0
            ? <div style={{color:"#9ca3af",fontSize:13}}>✅ Aucune relance urgente</div>
            : urgents.map(r=>{
              const cl=getC(r.client_id);
              return <div key={r.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"9px 0",borderBottom:"1px solid #f3f4f6"}}>
                <div>
                  <div style={{fontSize:13,fontWeight:600,color:"#111827"}}>{cl?.nom||"—"}</div>
                  <div style={{fontSize:12,color:"#6b7280",marginTop:2}}>{r.objet}</div>
                </div>
                <div style={{display:"flex",gap:6,alignItems:"center"}}>
                  <span style={{fontSize:12,color:"#c2410c",fontWeight:500}}>{dfmt(r.date)}</span>
                  <Btn v="g" onClick={()=>doneRel(r.id)} style={{padding:"3px 8px",color:"#16a34a"}}>✓</Btn>
                </div>
              </div>;
            })}
        </Card>
        <Card>
          <SecT>📦 Dernières commandes</SecT>
          {cmdsP.length===0
            ? <div style={{color:"#9ca3af",fontSize:13}}>Aucune commande sur cette période</div>
            : <table style={{width:"100%",borderCollapse:"collapse"}}>
                <thead><tr><TH>Client</TH><TH>Date</TH><TH>Total</TH><TH>Statut</TH></tr></thead>
                <tbody>{cmdsP.slice(0,5).map(c=>(
                  <tr key={c.id}>
                    <TD style={{fontWeight:600,color:"#111827",fontSize:12}}>{getC(c.client_id)?.nom||"—"}</TD>
                    <TD style={{color:"#6b7280",fontSize:12}}>{dfmt(c.date)}</TD>
                    <TD style={{fontWeight:700,color:"#16a34a",fontSize:12}}>{eur(c.total)}</TD>
                    <TD><Badge v={c.statut} c={SC[c.statut]||"#6b7280"}/></TD>
                  </tr>
                ))}</tbody>
              </table>}
        </Card>
      </div>
    </>;
  };

  const PageClients=()=>{
    const fl=clients.filter(c=>!q||c.nom?.toLowerCase().includes(q.toLowerCase())||c.ville?.toLowerCase().includes(q.toLowerCase())||c.email?.toLowerCase().includes(q.toLowerCase()));
    return <Card>
      <table style={{width:"100%",borderCollapse:"collapse"}}>
        <thead><tr><TH></TH><TH>Entreprise</TH><TH>Contact</TH><TH>Email</TH><TH>Ville</TH><TH>Segment</TH><TH>CA Total</TH><TH>Actions</TH></tr></thead>
        <tbody>{fl.map(c=>{
          const tc=c.type_contact||"Client";
          return (
          <tr key={c.id}>
            <TD style={{width:10}}>
              <span title={tc} style={{width:10,height:10,borderRadius:"50%",background:TC_COL[tc]||"#6b7280",display:"inline-block"}}/>
            </TD>
            <TD style={{fontWeight:600,color:"#111827"}}>
              <div>{c.nom}</div>
              <div style={{fontSize:11,color:TC_COL[tc]||"#6b7280",fontWeight:600}}>{tc}</div>
            </TD>
            <TD>{c.contact||"—"}</TD>
            <TD style={{fontSize:12,color:"#6b7280"}}>{c.email||"—"}</TD>
            <TD>{c.ville||"—"}</TD>
            <TD><Badge v={c.segment||"—"} c={segColor(c.segment)}/></TD>
            <TD style={{fontWeight:700,color:"#16a34a"}}>{eur(c.ca_total)}</TD>
            <TD>
              <div style={{display:"flex",gap:6}}>
                <Btn v="s" style={{padding:"4px 10px",fontSize:11}} onClick={()=>setModal({t:"cedit",d:{...c}})}>✏️ Modifier</Btn>
                <Btn v="s" style={{padding:"4px 10px",fontSize:11}} onClick={()=>setModal({t:"rel",d:{client_id:c.id}})}>Relancer</Btn>
                <Btn v="s" style={{padding:"4px 10px",fontSize:11}} onClick={()=>setModal({t:"cdet",d:c})}>👁 Voir</Btn>
              </div>
            </TD>
          </tr>
        )}}</tbody>
      </table>
      {fl.length===0&&<div style={{padding:24,textAlign:"center",color:"#9ca3af"}}>Aucun client trouvé</div>}
    </Card>;
  };

  const PageCmds=()=>{
    const fl=cmds.filter(c=>!q||getC(c.client_id)?.nom?.toLowerCase().includes(q.toLowerCase()));
    return <Card>
      <table style={{width:"100%",borderCollapse:"collapse"}}>
        <thead><tr><TH>Client</TH><TH>Date</TH><TH>Produits</TH><TH>Total TTC</TH><TH>Statut</TH><TH>Facture</TH></tr></thead>
        <tbody>{fl.map(c=>{
          const pStr=(c.produits||[]).map(p=>{const pr=prods.find(x=>x.id===p.prod_id);return pr?`${pr.nom} ×${p.qte}`:""}).filter(Boolean).join(", ");
          return <tr key={c.id}>
            <TD style={{fontWeight:600,color:"#111827"}}>{getC(c.client_id)?.nom||"—"}</TD>
            <TD style={{color:"#6b7280"}}>{dfmt(c.date)}</TD>
            <TD style={{fontSize:12,color:"#6b7280",maxWidth:200}}>{pStr||"—"}</TD>
            <TD style={{fontWeight:700,color:"#16a34a"}}>{eur(c.total)}</TD>
            <TD><Badge v={c.statut} c={SC[c.statut]||"#6b7280"}/></TD>
            <TD>{c.facture_url
              ?<a href={c.facture_url} target="_blank" style={{color:"#1d4ed8",fontSize:12,fontWeight:500}}>📎 Télécharger</a>
              :<Btn v="s" style={{padding:"3px 9px",fontSize:11}} onClick={()=>setModal({t:"upload_facture",d:c})}>+ Facture</Btn>}
            </TD>
          </tr>;
        })}</tbody>
      </table>
    </Card>;
  };

  const PageRels=()=>{
    const [vue,setVue]=useState("liste"); // "liste" | "calendrier"
    const [calMois,setCalMois]=useState(()=>{const d=new Date();return{y:d.getFullYear(),m:d.getMonth()};});
    const todo=rels.filter(r=>r.statut!=="Fait");
    const done=rels.filter(r=>r.statut==="Fait");

    const statutProspect=id=>{const cl=getC(id);return cl?.statut_prospect||"client";};
    const colClient=id=>statutProspect(id)==="prospect"?"#f59e0b":"#16a34a";
    const labelClient=id=>statutProspect(id)==="prospect"?"Prospect":"Client";

    const Row=({r})=>{
      const cl=getC(r.client_id);
      const cc=colClient(r.client_id);
      return <tr>
        <TD>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <span style={{width:8,height:8,borderRadius:"50%",background:cc,flexShrink:0,display:"inline-block"}}/>
            <span style={{fontWeight:600,color:"#111827"}}>{cl?.nom||"—"}</span>
            <Badge v={labelClient(r.client_id)} c={cc}/>
          </div>
        </TD>
        <TD style={{color:"#374151"}}>{r.objet}</TD>
        <TD style={{color:"#6b7280",whiteSpace:"nowrap"}}>{dfmt(r.date)}</TD>
        <TD>{r.recurrence&&<Badge v={"↻ "+r.recurrence} c="#7c3aed"/>}</TD>
        <TD><Badge v={r.priorite||"Normale"} c={r.priorite==="Haute"?"#c2410c":"#1d4ed8"}/></TD>
        <TD><Badge v={r.statut} c={SC[r.statut]||"#6b7280"}/></TD>
        <TD>
          <div style={{display:"flex",gap:5}}>
            {r.statut!=="Fait"&&<>
              <Btn v="s" onClick={()=>doneRel(r.id)} style={{padding:"3px 8px",fontSize:11}}>✓</Btn>
              <Btn v="s" onClick={()=>setModal({t:"rel",d:{...r}})} style={{padding:"3px 8px",fontSize:11}}>✏️</Btn>
            </>}
            <Btn v="s" onClick={()=>deleteRel(r.id)} style={{padding:"3px 8px",fontSize:11,color:"#dc2626"}}>🗑</Btn>
          </div>
        </TD>
      </tr>;
    };

    // ── Calendrier ──────────────────────────────────────────────────────────
    const Cal=()=>{
      const {y,m}=calMois;
      const premier=new Date(y,m,1);
      const dernier=new Date(y,m+1,0);
      const jourDebut=(premier.getDay()+6)%7; // lundi=0
      const nbJours=dernier.getDate();
      const cellules=[];
      for(let i=0;i<jourDebut;i++) cellules.push(null);
      for(let d=1;d<=nbJours;d++) cellules.push(d);

      const relsParJour={};
      rels.forEach(r=>{
        const d=r.date?.slice(0,10);
        if(!d) return;
        const rd=new Date(d);
        if(rd.getFullYear()===y&&rd.getMonth()===m){
          const j=rd.getDate();
          if(!relsParJour[j]) relsParJour[j]=[];
          relsParJour[j].push(r);
        }
      });

      const moisNom=premier.toLocaleString("fr-FR",{month:"long",year:"numeric"});
      const jours=["Lun","Mar","Mer","Jeu","Ven","Sam","Dim"];
      const todayN=new Date();

      return <div>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
          <Btn v="s" onClick={()=>setCalMois(p=>{const d=new Date(p.y,p.m-1,1);return{y:d.getFullYear(),m:d.getMonth()};})}>‹ Mois préc.</Btn>
          <span style={{fontWeight:700,fontSize:15,color:"#111827",textTransform:"capitalize"}}>{moisNom}</span>
          <Btn v="s" onClick={()=>setCalMois(p=>{const d=new Date(p.y,p.m+1,1);return{y:d.getFullYear(),m:d.getMonth()};})}>Mois suiv. ›</Btn>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4,marginBottom:4}}>
          {jours.map(j=><div key={j} style={{textAlign:"center",fontSize:11,fontWeight:600,color:"#9ca3af",padding:"4px 0"}}>{j}</div>)}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4}}>
          {cellules.map((d,i)=>{
            if(!d) return <div key={i}/>;
            const isToday=todayN.getFullYear()===y&&todayN.getMonth()===m&&todayN.getDate()===d;
            const rJour=relsParJour[d]||[];
            const dateStr=`${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
            return <div key={i} style={{minHeight:70,background:isToday?"#f0fdf4":"#fff",
              border:"1px solid "+(isToday?"#16a34a":"#e5e7eb"),borderRadius:6,padding:"4px 6px",
              cursor:"pointer",position:"relative"}}
              onClick={()=>setModal({t:"rel",d:{date:dateStr}})}>
              <div style={{fontSize:11,fontWeight:isToday?700:400,color:isToday?"#16a34a":"#374151",marginBottom:3}}>{d}</div>
              {rJour.slice(0,3).map((r,ri)=>{
                const cl=getC(r.client_id);
                const cc=colClient(r.client_id);
                return <div key={ri} title={`${cl?.nom} — ${r.objet}`}
                  onClick={e=>{e.stopPropagation();setModal({t:"rel",d:{...r}});}}
                  style={{fontSize:10,background:cc+"18",color:cc,borderRadius:3,padding:"1px 4px",
                    marginBottom:2,overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis",
                    cursor:"pointer",border:"1px solid "+cc+"30",fontWeight:500}}>
                  {r.statut==="Fait"?"✓ ":""}{cl?.nom?.split(" ")[0]||"?"} — {r.objet?.slice(0,15)}
                </div>;
              })}
              {rJour.length>3&&<div style={{fontSize:9,color:"#9ca3af"}}>+{rJour.length-3} autres</div>}
            </div>;
          })}
        </div>
        <div style={{marginTop:12,display:"flex",gap:16,fontSize:12,color:"#6b7280"}}>
          <span><span style={{display:"inline-block",width:10,height:10,borderRadius:"50%",background:"#16a34a",marginRight:4}}/>Client</span>
          <span><span style={{display:"inline-block",width:10,height:10,borderRadius:"50%",background:"#f59e0b",marginRight:4}}/>Prospect</span>
          <span style={{color:"#9ca3af",fontStyle:"italic"}}>Cliquer sur un jour pour créer une relance</span>
        </div>
      </div>;
    };

    return <>
      {/* Toggle vue */}
      <div style={{display:"flex",gap:4,background:"#f3f4f6",borderRadius:8,padding:3,marginBottom:14,width:"fit-content"}}>
        {[["liste","📋 Liste"],["calendrier","📅 Calendrier"]].map(([id,lbl])=>(
          <button key={id} onClick={()=>setVue(id)} style={{
            padding:"6px 14px",borderRadius:6,border:"none",fontSize:13,fontWeight:600,cursor:"pointer",
            background:vue===id?"#fff":"transparent",color:vue===id?"#111827":"#6b7280",

      {d.recurrence&&d.recurrence!=="aucune"&&!isEdit&&(
        <div style={{background:"#eff6ff",border:"1px solid #bfdbfe",borderRadius:7,padding:"8px 12px",marginBottom:12,fontSize:12,color:"#1d4ed8"}}>
          ↻ Des relances seront automatiquement créées tous les <strong>{d.recurrence} mois</strong>{d.recurrence_fin?(" jusqu’au "+dfmt(d.recurrence_fin)):" sans date de fin (max 24 occurrences)"}.
        </div>
      )}

      <Btn onClick={()=>saveRel(d)}>{isEdit?"💾 Enregistrer les modifications":"Créer la relance"}</Btn>
    </Ovl>;
  };

  const MCDet=()=>{
    const c=modal?.d; if(!c) return null;
    const cCmds=cmds.filter(x=>x.client_id===c.id);
    const cEchanges=echanges.filter(x=>x.client_id===c.id).sort((a,b)=>b.date.localeCompare(a.date));
    const [onglet,setOnglet]=useState("info");
    return <Ovl onClose={cls} wide>
      <MH title={c.nom} onClose={cls}/>
      {/* KPIs */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:14}}>
        {[
          {l:"CA Total",v:eur(c.ca_total),col:"#16a34a"},
          {l:"Commandes",v:cCmds.length,col:"#1d4ed8"},
          {l:"Échanges",v:cEchanges.length,col:"#7c3aed"},
          {l:"Segment",v:c.segment||"—",col:segColor(c.segment)}
        ].map(({l,v,col})=>(
          <div key={l} style={{background:"#f9fafb",borderRadius:9,padding:"9px 12px",border:"1px solid #f3f4f6"}}>
            <div style={{fontSize:10,color:"#9ca3af",textTransform:"uppercase",letterSpacing:.7,fontWeight:600}}>{l}</div>
            <div style={{fontSize:16,fontWeight:800,color:col,marginTop:3}}>{v}</div>
          </div>
        ))}
      </div>
      <div style={{background:TC_BG[c.type_contact||"Client"],border:"1px solid "+(TC_COL[c.type_contact||"Client"]||"#6b7280")+"40",
        borderRadius:7,padding:"6px 12px",marginBottom:10,display:"inline-flex",alignItems:"center",gap:6}}>
        <span style={{width:8,height:8,borderRadius:"50%",background:TC_COL[c.type_contact||"Client"],display:"inline-block"}}/>
        <span style={{fontSize:13,fontWeight:700,color:TC_COL[c.type_contact||"Client"]}}>{c.type_contact||"Client"}</span>
      </div>
      <div style={{fontSize:13,color:"#6b7280",marginBottom:10,lineHeight:1.8}}>
        📧 {c.email||"—"} {" | "} 📞 {c.tel||"—"} {" | "}
        📍 {[c.adresse,c.code_postal,c.ville,c.pays].filter(Boolean).join(", ")||"—"}
      </div>
      {c.notes&&<div style={{background:"#f0fdf4",border:"1px solid #bbf7d0",borderRadius:8,padding:"7px 12px",fontSize:12,color:"#166534",marginBottom:12}}>🏷️ {c.notes}</div>}

      {/* Onglets */}
      <div style={{display:"flex",gap:0,borderBottom:"2px solid #f3f4f6",marginBottom:16}}>
        {[["info","📋 Infos & Commandes"],["echanges","💬 Historique échanges"]].map(([id,lbl])=>(
          <button key={id} onClick={()=>setOnglet(id)} style={{
            padding:"8px 16px",border:"none",background:"none",cursor:"pointer",fontSize:13,fontWeight:600,
            color:onglet===id?"#16a34a":"#6b7280",
            borderBottom:onglet===id?"2px solid #16a34a":"2px solid transparent",
            marginBottom:-2
          }}>{lbl}</button>
        ))}
      </div>

      {/* Onglet Infos */}
      {onglet==="info"&&<>
        {cCmds.length>0&&<>
          <SecT>Commandes ({cCmds.length})</SecT>
          {cCmds.slice(0,5).map(cmd=>(
            <div key={cmd.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid #f3f4f6",fontSize:13,gap:8}}>
              <span style={{color:"#6b7280"}}>{dfmt(cmd.date)}</span>
              <span style={{fontWeight:700,color:"#16a34a"}}>{eur(cmd.total)}</span>
              <Badge v={cmd.statut} c={SC[cmd.statut]||"#6b7280"}/>
              {cmd.facture_url?<a href={cmd.facture_url} target="_blank" style={{color:"#1d4ed8",fontSize:12}}>📎 Facture</a>
                :<span style={{color:"#d1d5db",fontSize:12}}>—</span>}
            </div>
          ))}
        </>}
        {cCmds.length===0&&<div style={{color:"#9ca3af",fontSize:13,padding:"8px 0"}}>Aucune commande</div>}
      </>}

      {/* Onglet Échanges */}
      {onglet==="echanges"&&<MEchanges client={c} cEchanges={cEchanges}/>}

      <Divider/>
      <div style={{display:"flex",gap:9,flexWrap:"wrap"}}>
        <Btn onClick={()=>setModal({t:"cedit",d:{...c}})}>✏️ Modifier</Btn>
        <Btn v="s" onClick={()=>setModal({t:"rel",d:{client_id:c.id}})}>+ Relance</Btn>
        <Btn v="s" onClick={()=>setModal({t:"cmd"})}>+ Commande</Btn>
      </div>
    </Ovl>;
  };

  // ── Historique échanges (sous-composant inline) ────────────────────────────
  const MEchanges=({client,cEchanges})=>{
    const TYPE_ICO={"Téléphone":"📞","Email":"📧","Visite":"🤝","WhatsApp":"💬","Autre":"📝"};
    const TYPE_COL={"Téléphone":"#0369a1","Email":"#7c3aed","Visite":"#16a34a","WhatsApp":"#059669","Autre":"#6b7280"};
    const [form,setForm]=useState({date:now(),type:"Téléphone",objet:"",contenu:"",suite:""});
    const [showForm,setShowForm]=useState(false);
    const u=k=>e=>setForm(p=>({...p,[k]:e.target.value}));
    const submit=async()=>{
      if(!form.objet.trim()){err("Veuillez renseigner l'objet");return;}
      await saveEchange({...form,client_id:client.id});
      setForm({date:now(),type:"Téléphone",objet:"",contenu:"",suite:""});
      setShowForm(false);
    };
    return <div>
      {/* Bouton + formulaire */}
      {!showForm
        ?<Btn v="p" onClick={()=>setShowForm(true)} style={{marginBottom:14,fontSize:12}}>+ Nouvel échange</Btn>
        :<div style={{background:"#f9fafb",border:"1px solid #e5e7eb",borderRadius:10,padding:"14px 16px",marginBottom:16}}>
          <div style={{fontWeight:600,fontSize:13,color:"#111827",marginBottom:12}}>Nouvel échange</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:10}}>
            <Fld label="Date"><Inp type="date" value={form.date} onChange={u("date")}/></Fld>
            <Fld label="Type"><Sel value={form.type} onChange={u("type")}>
              {["Téléphone","Email","Visite","WhatsApp","Autre"].map(v=><option key={v}>{v}</option>)}
            </Sel></Fld>
            <Fld label="Objet"><Inp value={form.objet} onChange={u("objet")} placeholder="Ex: Commande, Réclamation..."/></Fld>
          </div>
          <Fld label="Contenu / Notes">
            <textarea value={form.contenu} onChange={u("contenu")} placeholder="Détails de l'échange..."
              style={{background:"#fff",border:"1px solid #d1d5db",borderRadius:7,padding:"9px 12px",
                color:"#111827",fontSize:13,width:"100%",outline:"none",height:70,resize:"vertical"}}/>
          </Fld>
          <Fld label="Suite à donner">
            <Inp value={form.suite} onChange={u("suite")} placeholder="Ex: Rappeler la semaine prochaine, Envoyer devis..."/>
          </Fld>
          <div style={{display:"flex",gap:8}}>
            <Btn onClick={submit} style={{fontSize:12}}>💾 Enregistrer</Btn>
            <Btn v="s" onClick={()=>setShowForm(false)} style={{fontSize:12}}>Annuler</Btn>
          </div>
        </div>}

      {/* Timeline échanges */}
      {cEchanges.length===0
        ?<div style={{color:"#9ca3af",fontSize:13,padding:"12px 0",textAlign:"center"}}>
            Aucun échange enregistré pour ce client
          </div>
        :<div style={{position:"relative"}}>
          <div style={{position:"absolute",left:15,top:0,bottom:0,width:2,background:"#f3f4f6"}}/>
          {cEchanges.map((e,i)=>(
            <div key={e.id} style={{display:"flex",gap:12,marginBottom:14,position:"relative"}}>
              {/* Icône type */}
              <div style={{width:32,height:32,borderRadius:"50%",background:(TYPE_COL[e.type]||"#6b7280")+"18",
                border:"2px solid "+(TYPE_COL[e.type]||"#6b7280"),
                display:"flex",alignItems:"center",justifyContent:"center",
                fontSize:14,flexShrink:0,zIndex:1,background:"#fff"}}>
                {TYPE_ICO[e.type]||"📝"}
              </div>
              {/* Contenu */}
              <div style={{flex:1,background:"#fff",border:"1px solid #e5e7eb",borderRadius:9,
                padding:"10px 14px",boxShadow:"0 1px 2px rgba(0,0,0,.04)"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4}}>
                  <div style={{display:"flex",gap:7,alignItems:"center"}}>
                    <Badge v={e.type} c={TYPE_COL[e.type]||"#6b7280"}/>
                    <span style={{fontWeight:600,fontSize:13,color:"#111827"}}>{e.objet}</span>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <span style={{fontSize:11,color:"#9ca3af"}}>{dfmt(e.date)}</span>
                    <button onClick={()=>deleteEchange(e.id)} style={{background:"none",border:"none",
                      color:"#d1d5db",cursor:"pointer",fontSize:14,lineHeight:1,padding:0}} title="Supprimer">×</button>
                  </div>
                </div>
                {e.contenu&&<p style={{fontSize:12,color:"#374151",lineHeight:1.6,margin:"4px 0"}}>{e.contenu}</p>}
                {e.suite&&<div style={{marginTop:6,background:"#fff7ed",border:"1px solid #fed7aa",borderRadius:5,
                  padding:"4px 9px",fontSize:11,color:"#c2410c",fontWeight:500}}>
                  ➡️ Suite : {e.suite}
                </div>}
              </div>
            </div>
          ))}
        </div>}
    </div>;
  };

  const MUploadFacture=()=>{
    const cmd=modal?.d; if(!cmd) return null;
    const [file,setFile]=useState(null);
    const [uploading,setUploading]=useState(false);
    const fRef3=useRef();
    const upload=async()=>{
      if(!file)return;
      setUploading(true);
      try{
        const url=await uploadFacture(file,cmd.id);
        await api(`commandes?id=eq.${cmd.id}`,"PATCH",{facture_url:url});
        await load();ok("Facture uploadée ✓");cls();
      }catch(e){err("Erreur : "+e.message);}
      setUploading(false);
    };
    return <Ovl onClose={cls}>
      <MH title="📎 Ajouter une facture" onClose={cls}/>
      <p style={{fontSize:13,color:"#6b7280",marginBottom:16}}>
        Commande du <strong>{dfmt(cmd.date)}</strong> — <strong style={{color:"#16a34a"}}>{eur(cmd.total)}</strong>
      </p>
      <input ref={fRef3} type="file" accept=".pdf,.png,.jpg,.jpeg" style={{display:"none"}} onChange={e=>setFile(e.target.files[0])}/>
      <div style={{border:"2px dashed #d1d5db",borderRadius:9,padding:"28px",textAlign:"center",marginBottom:16,cursor:"pointer",background:"#fafafa"}} onClick={()=>fRef3.current?.click()}>
        {file
          ?<div><div style={{fontSize:28,marginBottom:6}}>📄</div><div style={{fontWeight:600,color:"#16a34a"}}>{file.name}</div><div style={{fontSize:12,color:"#9ca3af",marginTop:4}}>{Math.round(file.size/1024)} Ko</div></div>
          :<div><div style={{fontSize:36,marginBottom:8}}>📂</div><div style={{fontWeight:600,color:"#374151"}}>Cliquer pour choisir</div><div style={{fontSize:12,color:"#9ca3af",marginTop:4}}>PDF, PNG, JPG acceptés</div></div>}
      </div>
      <Btn onClick={upload} style={{opacity:(!file||uploading)?.5:1}}>
        {uploading?"Envoi en cours...":"📤 Envoyer la facture"}
      </Btn>
    </Ovl>;
  };

  const MImport=()=>(
    <Ovl onClose={cls}>
      <MH title="📥 Import Capsule CRM" onClose={cls}/>
      <p style={{fontSize:13,color:"#6b7280",lineHeight:1.7,marginBottom:16}}>
        Importez votre export CSV depuis Capsule.<br/>
        <strong style={{color:"#16a34a"}}>Capsule → Settings → Export → Contacts → CSV</strong>
      </p>
      {prog?(
        <div>
          <div style={{fontSize:13,color:"#374151",marginBottom:9}}>{prog.done}/{prog.total} lignes traitées</div>
          <div style={{height:8,background:"#f3f4f6",borderRadius:4}}>
            <div style={{height:"100%",width:Math.round(prog.done/prog.total*100)+"%",background:"#16a34a",borderRadius:4,transition:"width .2s"}}/>
          </div>
          <div style={{fontSize:13,color:"#16a34a",fontWeight:600,marginTop:8}}>{prog.imp} contacts importés...</div>
        </div>
      ):(
        <>
          <input ref={fRef} type="file" accept=".csv" style={{display:"none"}} onChange={e=>e.target.files[0]&&importCSV(e.target.files[0])}/>
          <Btn onClick={()=>fRef.current?.click()}>📂 Choisir le fichier CSV</Btn>
        </>
      )}
    </Ovl>
  );

  // ── NAV ─────────────────────────────────────────────────────────────────────
  const nav=[
    {id:"dash",     lbl:"Tableau de bord",ico:"📊"},
    {id:"clients",  lbl:"Clients",        ico:"👥"},
    {id:"commandes",lbl:"Commandes",      ico:"📦"},
    {id:"relances", lbl:"Relances",       ico:"📅"},
    {id:"produits", lbl:"Produits",       ico:"🌿"},
    {id:"historique",lbl:"Historique",      ico:"💬"},
    {id:"params",   lbl:"Paramètres",     ico:"⚙️"},
  ];

  const addBtns={
    clients:   [{lbl:"Importer CSV",v:"s",fn:()=>setModal({t:"import"})},{lbl:"+ Nouveau client",v:"p",fn:()=>setModal({t:"cedit",d:{}})}],
    commandes: [{lbl:"+ Nouvelle commande",v:"p",fn:()=>setModal({t:"cmd"})}],
    relances:  [{lbl:"+ Nouvelle relance",v:"p",fn:()=>setModal({t:"rel",d:{}})}],
    produits:  [{lbl:"+ Nouveau produit",v:"p",fn:()=>setModal({t:"pedit",d:{nom:"",categorie:"",prix_ht:"",tva:"20"}})}],
  };

  return (
    <div style={{display:"flex",minHeight:"100vh",background:"#f5f6fa"}}>
      {/* Sidebar */}
      <nav style={{width:220,minWidth:220,background:"#fff",borderRight:"1px solid #e5e7eb",display:"flex",flexDirection:"column",boxShadow:"1px 0 4px rgba(0,0,0,.04)"}}>
        <div style={{padding:"22px 18px 16px",borderBottom:"1px solid #f3f4f6"}}>
          <div style={{fontSize:18,fontWeight:800,color:"#16a34a"}}>🌿 Jungle Feed</div>
          <div style={{fontSize:10,color:"#9ca3af",fontWeight:600,textTransform:"uppercase",letterSpacing:1.5,marginTop:3}}>CRM Commercial</div>
        </div>
        <div style={{marginTop:10,flex:1}}>
          {nav.map(n=>(
            <div key={n.id} onClick={()=>setPg(n.id)} style={{
              display:"flex",alignItems:"center",gap:9,padding:"10px 18px",cursor:"pointer",
              borderRadius:"0 20px 20px 0",marginRight:12,marginTop:2,
              background:pg===n.id?"#f0fdf4":"transparent",
              color:pg===n.id?"#16a34a":"#374151",
              fontWeight:pg===n.id?700:500,fontSize:13,
              borderLeft:pg===n.id?"3px solid #16a34a":"3px solid transparent"}}>
              <span>{n.ico}</span>{n.lbl}
              {n.id==="relances"&&urgents.length>0&&
                <span style={{marginLeft:"auto",background:"#dc2626",color:"#fff",borderRadius:"50%",
                  width:17,height:17,display:"flex",alignItems:"center",justifyContent:"center",
                  fontSize:10,fontWeight:800}}>{urgents.length}</span>}
            </div>
          ))}
        </div>
        <div style={{padding:"0 14px 16px"}}>
          <div style={{background:"#f0fdf4",border:"1px solid #bbf7d0",borderRadius:9,padding:"10px 13px",marginBottom:8}}>
            <div style={{fontSize:10,color:"#6b7280",fontWeight:600,textTransform:"uppercase",letterSpacing:.8}}>CA du jour</div>
            <div style={{fontSize:20,fontWeight:800,color:"#16a34a"}}>{eur(caJour)}</div>
          </div>
          <Btn v="s" onClick={load} style={{width:"100%",justifyContent:"center",fontSize:12}}>↻ Actualiser</Btn>
        </div>
      </nav>

      {/* Main */}
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        <div style={{padding:"14px 26px",borderBottom:"1px solid #e5e7eb",display:"flex",alignItems:"center",
          justifyContent:"space-between",background:"#fff",flexShrink:0,boxShadow:"0 1px 3px rgba(0,0,0,.04)"}}>
          <div style={{fontSize:19,fontWeight:800,color:"#111827"}}>{nav.find(n=>n.id===pg)?.lbl}</div>
          <div style={{display:"flex",alignItems:"center",gap:9}}>
            {(pg==="clients"||pg==="commandes")&&(
              <div style={{display:"flex",alignItems:"center",gap:7,background:"#f9fafb",border:"1px solid #e5e7eb",borderRadius:8,padding:"7px 12px"}}>
                <span style={{color:"#9ca3af"}}>🔍</span>
                <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Rechercher..."
                  style={{background:"none",border:"none",outline:"none",color:"#111827",fontSize:13,width:180}}/>
              </div>
            )}
            {(addBtns[pg]||[]).map((b,i)=><Btn key={i} v={b.v} onClick={b.fn}>{b.lbl}</Btn>)}
          </div>
        </div>
        <div style={{padding:"22px 26px",overflowY:"auto",flex:1}}>
          {pg==="dash"      &&<Dash/>}
          {pg==="clients"   &&<PageClients/>}
          {pg==="commandes" &&<PageCmds/>}
          {pg==="relances"  &&<PageRels/>}
          {pg==="produits"  &&<PageProds/>}
          {pg==="historique"&&<PageHistorique/>}
          {pg==="params"    &&<PageParams/>}
        </div>
      </div>

      {/* Modales */}
      {(modal?.t==="cedit"||modal?.t==="cnew") && <MClientForm/>}
      {modal?.t==="pedit"          && <MProdForm/>}
      {modal?.t==="cmd"            && <MCmdNew/>}
      {modal?.t==="rel"            && <MRelNew/>}
      {modal?.t==="cdet"           && <MCDet/>}
      {modal?.t==="import"         && <MImport/>}
      {modal?.t==="upload_facture" && <MUploadFacture/>}

      {/* Toast */}
      {toast&&(
        <div style={{position:"fixed",bottom:24,right:24,
          background:toast.t==="err"?"#fef2f2":"#f0fdf4",
          border:"1px solid "+(toast.t==="err"?"#fca5a5":"#86efac"),
          borderRadius:9,padding:"12px 18px",fontSize:13,fontWeight:600,
          color:toast.t==="err"?"#dc2626":"#16a34a",
          zIndex:9999,boxShadow:"0 4px 16px rgba(0,0,0,.1)"}}>
          {toast.msg}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
